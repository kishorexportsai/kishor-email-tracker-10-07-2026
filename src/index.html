<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kishor Exports - Email Tracker & CRM</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 5px;
    }

    .logo p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-login {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-google {
      background: white;
      color: #333;
      border: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-google:hover {
      background: #f8f8f8;
      border-color: #ccc;
    }

    .google-icon {
      width: 18px;
      height: 18px;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      color: #999;
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      content: '';
      display: inline-block;
      width: 40%;
      height: 1px;
      background: #ddd;
      vertical-align: middle;
    }

    .divider::before {
      margin-right: 10px;
    }

    .divider::after {
      margin-left: 10px;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 13px;
      border-left: 4px solid #c33;
      display: none;
    }

    .success-message {
      background: #efe;
      color: #3c3;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 13px;
      border-left: 4px solid #3c3;
      display: none;
    }

    .loading {
      display: none;
      text-align: center;
      color: #667eea;
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer-text {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- Logo Section -->
    <div class="logo">
      <h1>🚀 Kishor Exports</h1>
      <p>Email Tracker & CRM — Internal Tool</p>
    </div>

    <!-- Error Message -->
    <div class="error-message" id="errorMessage"></div>

    <!-- Success Message -->
    <div class="success-message" id="successMessage"></div>

    <!-- Loading Indicator -->
    <div class="loading" id="loadingIndicator">
      <div class="spinner"></div>
      Connecting to Gmail...
    </div>

    <!-- Login Form -->
    <form id="loginForm" style="display: block;">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="text" id="email" name="email" placeholder="admin@kishorexports.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>

      <div class="button-group">
        <button type="submit" class="btn-login">Sign In</button>
      </div>
    </form>

    <!-- Divider -->
    <div class="divider">or</div>

    <!-- Google OAuth Button -->
    <div class="button-group">
      <button type="button" class="btn-google" onclick="connectGmail()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>
    </div>

    <!-- Footer -->
    <div class="footer-text">
      Protected by Gmail OAuth 2.0
    </div>
  </div>

  <!-- =====================================================
       OAUTH SUCCESS HANDLER - REDIRECT TO DASHBOARD
       ===================================================== -->
  <script>
    // Check if Gmail login was successful on page load
    document.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const googleLoginSuccess = urlParams.get('google_login');
      const email = urlParams.get('email');
      
      console.log('[OAuth] Page loaded. Checking for oauth success...');
      console.log('[OAuth] google_login param:', googleLoginSuccess);
      console.log('[OAuth] email param:', email);
      
      if (googleLoginSuccess === 'success' && email) {
        console.log(`✅ [OAuth] Gmail connected successfully for ${email}`);
        
        // Hide login form
        document.getElementById('loginForm').style.display = 'none';
        
        // Show success message
        const successMsg = document.getElementById('successMessage');
        successMsg.textContent = `✅ Gmail connected! Redirecting to dashboard for ${email}...`;
        successMsg.style.display = 'block';
        
        // Redirect to dashboard after 2 seconds
        setTimeout(() => {
          console.log('[OAuth] Redirecting to dashboard...');
          window.location.href = '/dashboard.html';
        }, 2000);
      } else {
        // Show login form normally
        document.getElementById('loginForm').style.display = 'block';
      }
    });

    // Handle admin login form submission
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      console.log('[Login] Attempting admin login for:', email);
      
      // TODO: Implement admin login logic
      // For now, just show a message
      const errorMsg = document.getElementById('errorMessage');
      errorMsg.textContent = 'Admin login not yet implemented. Please use "Sign in with Google" to connect Gmail.';
      errorMsg.style.display = 'block';
    });

    // Connect Gmail via OAuth
    function connectGmail() {
      console.log('[OAuth] Initiating Gmail connection...');
      
      // Show loading indicator
      document.getElementById('loadingIndicator').style.display = 'block';
      document.getElementById('loginForm').style.display = 'none';
      
      // Get default account email
      const defaultAccount = 'kishor.merchant06@gmail.com'; // Change if needed
      
      // Redirect to OAuth endpoint
      console.log('[OAuth] Redirecting to /auth/google with account:', defaultAccount);
      window.location.href = `/auth/google?account=${encodeURIComponent(defaultAccount)}`;
    }

    // Hide error message after 5 seconds
    function hideErrorMessage() {
      setTimeout(() => {
        const errorMsg = document.getElementById('errorMessage');
        if (errorMsg && errorMsg.style.display !== 'none') {
          errorMsg.style.display = 'none';
        }
      }, 5000);
    }
  </script>
</body>
</html>
