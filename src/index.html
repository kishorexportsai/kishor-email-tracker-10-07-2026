<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kishor Exports - Email Tracker & CRM</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 5px;
    }

    .logo p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-login {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-google {
      background: white;
      color: #333;
      border: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-google:hover {
      background: #f8f8f8;
      border-color: #ccc;
    }

    .google-icon {
      width: 18px;
      height: 18px;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      color: #999;
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      content: '';
      display: inline-block;
      width: 40%;
      height: 1px;
      background: #ddd;
      vertical-align: middle;
    }

    .divider::before {
      margin-right: 10px;
    }

    .divider::after {
      margin-left: 10px;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 13px;
      border-left: 4px solid #c33;
      display: none;
    }

    .success-message {
      background: #efe;
      color: #3c3;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 13px;
      border-left: 4px solid #3c3;
      display: none;
    }

    .loading {
      display: none;
      text-align: center;
      color: #667eea;
      font-size: 14px;
      margin: 40px 0;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer-text {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 20px;
    }

    .debug-info {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 5px;
      font-size: 11px;
      color: #666;
      margin-top: 20px;
      border: 1px solid #ddd;
      display: none;
      max-height: 150px;
      overflow-y: auto;
    }

    .debug-info p {
      margin: 3px 0;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- Logo Section -->
    <div class="logo">
      <h1>🚀 Kishor Exports</h1>
      <p>Email Tracker & CRM — Internal Tool</p>
    </div>

    <!-- Error Message -->
    <div class="error-message" id="errorMessage"></div>

    <!-- Success Message -->
    <div class="success-message" id="successMessage"></div>

    <!-- Loading Indicator -->
    <div class="loading" id="loadingIndicator">
      <div class="spinner"></div>
      <div>Connecting to Gmail...</div>
      <div style="font-size: 12px; margin-top: 10px; color: #999;">Please wait, you'll be redirected shortly...</div>
    </div>

    <!-- Login Form -->
    <form id="loginForm" style="display: block;">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="text" id="email" name="email" placeholder="admin@kishorexports.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>

      <div class="button-group">
        <button type="submit" class="btn-login">Sign In</button>
      </div>
    </form>

    <!-- Divider -->
    <div class="divider">or</div>

    <!-- Google OAuth Button -->
    <div class="button-group">
      <button type="button" class="btn-google" onclick="connectGmail()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>
    </div>

    <!-- Footer -->
    <div class="footer-text">
      Protected by Gmail OAuth 2.0
    </div>

    <!-- Debug Info (hidden by default) -->
    <div class="debug-info" id="debugInfo"></div>
  </div>

  <!-- =====================================================
       OAUTH SUCCESS HANDLER - REDIRECT TO DASHBOARD
       ===================================================== -->
  <script>
    // Debug function
    function debug(message) {
      const debugEl = document.getElementById('debugInfo');
      if (!debugEl) return;
      
      const p = document.createElement('p');
      p.textContent = message;
      debugEl.appendChild(p);
      
      console.log('[DEBUG]', message);
    }

    // Check if Gmail login was successful on page load
    document.addEventListener('DOMContentLoaded', function() {
      console.log('=== PAGE LOADED - CHECKING FOR OAUTH REDIRECT ===');
      
      // Get all URL parameters
      const urlParams = new URLSearchParams(window.location.search);
      const fullUrl = window.location.href;
      
      console.log('[OAuth] Full URL:', fullUrl);
      console.log('[OAuth] URL Parameters:', Array.from(urlParams.entries()));
      
      debug('Full URL: ' + fullUrl);
      debug('URL Params: ' + Array.from(urlParams.entries()).map(p => p.join('=')).join(', '));
      
      // Check for different possible parameter names
      const googleLoginSuccess = urlParams.get('google_login');
      const email = urlParams.get('email');
      const account = urlParams.get('account');
      const success = urlParams.get('success');
      
      console.log('[OAuth] google_login:', googleLoginSuccess);
      console.log('[OAuth] email:', email);
      console.log('[OAuth] account:', account);
      console.log('[OAuth] success:', success);
      
      debug('google_login param: ' + (googleLoginSuccess || 'NOT FOUND'));
      debug('email param: ' + (email || 'NOT FOUND'));
      debug('account param: ' + (account || 'NOT FOUND'));
      debug('success param: ' + (success || 'NOT FOUND'));
      
      // Check if ANY oauth success indicator is present
      const oauthSuccess = (
        googleLoginSuccess === 'success' || 
        success === 'true' ||
        email ||
        account
      );
      
      const userEmail = email || account || 'user';
      
      if (oauthSuccess) {
        console.log(`✅ [OAuth] Gmail authentication detected for ${userEmail}`);
        debug('✅ OAUTH SUCCESS DETECTED!');
        
        // Hide login form
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('loadingIndicator').style.display = 'block';
        document.getElementById('debugInfo').style.display = 'block';
        
        // Show success message
        const successMsg = document.getElementById('successMessage');
        successMsg.textContent = `✅ Gmail connected successfully! Redirecting to dashboard...`;
        successMsg.style.display = 'block';
        
        debug('Waiting 2 seconds before redirect...');
        
        // Redirect to dashboard after 2 seconds
        setTimeout(() => {
          console.log('[OAuth] Redirecting to dashboard...');
          debug('→ Redirecting to /dashboard.html');
          
          // Try multiple possible dashboard URLs
          const dashboardUrls = [
            '/dashboard.html',
            '/dashboard',
            '/admin',
            '/'
          ];
          
          // Redirect to first one that might exist
          window.location.href = dashboardUrls[0];
        }, 2000);
      } else {
        console.log('[OAuth] No oauth success indicators found. Showing login form.');
        debug('❌ NO OAUTH PARAMETERS FOUND');
        debug('Showing login form normally');
        
        // Show login form
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('loadingIndicator').style.display = 'none';
      }
    });

    // Handle admin login form submission
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      console.log('[Login] Attempting admin login for:', email);
      
      // Show error
      const errorMsg = document.getElementById('errorMessage');
      errorMsg.textContent = '⚠️ Admin login not yet implemented. Please use "Sign in with Google" to connect Gmail.';
      errorMsg.style.display = 'block';
    });

    // Connect Gmail via OAuth
    function connectGmail() {
      console.log('[OAuth] Initiating Gmail connection...');
      
      // Show loading indicator
      document.getElementById('loadingIndicator').style.display = 'block';
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('debugInfo').style.display = 'block';
      
      debug('→ Starting Gmail OAuth flow...');
      
      // Get default account email
      const defaultAccount = 'kishor.merchant06@gmail.com';
      
      debug('Account: ' + defaultAccount);
      debug('Redirecting to /auth/google...');
      
      // Redirect to OAuth endpoint
      console.log('[OAuth] Redirecting to /auth/google with account:', defaultAccount);
      window.location.href = `/auth/google?account=${encodeURIComponent(defaultAccount)}`;
    }
  </script>
</body>
</html>
